<!-- Hero Section - Split Screen with 3D Vector Video -->
<div class="w-full mx-auto dark:bg-black bg-white">
    <div id="home" class="hero-container relative overflow-hidden min-h-screen lg:min-h-screen flex items-center">
        
        <!-- Animated Particle Background -->
        <div class="particles-container absolute inset-0 overflow-hidden">
            <div class="particle particle-1"></div>
            <div class="particle particle-2"></div>
            <div class="particle particle-3"></div>
            <div class="particle particle-4"></div>
            <div class="particle particle-5"></div>
            <div class="particle particle-6"></div>
            <!-- Floating gradient orbs -->
            <div class="orb orb-1"></div>
            <div class="orb orb-2"></div>
            <div class="orb orb-3"></div>
        </div>

        <!-- Grid pattern overlay -->
        <div class="absolute inset-0 grid-pattern opacity-[0.03] dark:opacity-[0.05]"></div>
        
        <!-- Main Content - Split Layout -->
        <main class="relative z-10 w-full px-4 sm:px-6 lg:px-12 xl:px-20 max-w-7xl mx-auto py-6 lg:py-0">
            <div class="flex flex-col lg:grid lg:grid-cols-2 gap-4 sm:gap-6 lg:gap-12 items-center min-h-[85vh] lg:min-h-[80vh]">
                
                <!-- Left Side - Text Content -->
                <div class="order-2 lg:order-1 text-center lg:text-left pt-4 lg:pt-0">

                    <!-- Main Headline -->
                    <h1 class="text-4xl sm:text-5xl lg:text-6xl xl:text-7xl font-black tracking-tighter leading-[1.0] mb-5 sm:mb-6 animate-fade-up">
                        <span class="text-gray-900 dark:text-white">We build software</span>
                        <br>
                        <span class="text-gray-400 dark:text-zinc-600">that ships.</span>
                    </h1>

                    <!-- Subtitle -->
                    <p class="text-base sm:text-lg lg:text-xl text-gray-600 dark:text-gray-400 max-w-xl mx-auto lg:mx-0 mb-8 leading-relaxed animate-fade-up animation-delay-100">
                        ZYPHERX is a software studio. We design and engineer fast websites, web apps and ERP systems for startups and growing businesses.
                    </p>

                    <!-- CTA Buttons -->
                    <div class="flex flex-row flex-wrap items-center justify-center lg:justify-start gap-3 sm:gap-4 animate-fade-up animation-delay-200">
                        <a routerLink="/contact" class="group inline-flex items-center gap-2 px-6 py-3 sm:px-7 sm:py-3.5 bg-gray-900 dark:bg-white text-white dark:text-gray-900 font-semibold rounded-full hover:bg-gray-800 dark:hover:bg-gray-100 transition-all duration-300 text-sm sm:text-base">
                            Start a project
                            <svg class="w-4 h-4 transition-transform group-hover:translate-x-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"/>
                            </svg>
                        </a>
                        <a routerLink="/projects" class="inline-flex items-center gap-2 px-6 py-3 sm:px-7 sm:py-3.5 text-gray-700 dark:text-gray-300 font-semibold rounded-full border border-gray-300 dark:border-zinc-700 hover:border-gray-900 dark:hover:border-white hover:text-gray-900 dark:hover:text-white transition-all duration-300 text-sm sm:text-base">
                            View our work
                        </a>
                    </div>
                </div>

                <!-- Right Side - 3D Vector Video -->
                <div class="order-1 lg:order-2 flex items-center justify-center animate-fade-up pt-16 sm:pt-20 lg:pt-0">
                    <div class="hero-video-container relative w-full max-w-[280px] sm:max-w-sm md:max-w-md lg:max-w-xl xl:max-w-2xl"> 
                        <!-- Glow effect behind video -->
                        <div class="absolute inset-0 bg-gradient-to-br from-gray-300/30 via-gray-200/15 to-transparent dark:from-zinc-700/30 dark:via-zinc-800/15 dark:to-transparent blur-3xl scale-110 animate-pulse-slow"></div>
                        
                        <!-- Video Element with Transparency -->
                        <video 
                            class="relative w-full h-auto object-contain drop-shadow-2xl hero-3d-video select-none pointer-events-none"
                            autoplay 
                            loop 
                            muted 
                            playsinline
                            preload="auto"
                            disablePictureInPicture
                            controlsList="nodownload nofullscreen noremoteplayback"
                            draggable="false"
                            (contextmenu)="$event.preventDefault()"
                            #heroVideo>
                            <!-- WebM with alpha for Chrome, Firefox, Edge -->
                            <source src="assets/media/3d-casual-life-analytics-on-computer-screen.webm" type="video/webm">
                            Your browser does not support the video tag.
                        </video>
                        <!-- Floating accent elements around video - hidden on small mobile -->
                        <div class="absolute -top-4 -right-4 w-16 h-16 sm:w-20 sm:h-20 bg-gray-400/30 dark:bg-zinc-600/30 rounded-full blur-2xl opacity-60 animate-float hidden sm:block"></div>
                        <div class="absolute -bottom-6 -left-6 w-20 h-20 sm:w-24 sm:h-24 bg-gray-500/20 dark:bg-zinc-700/25 rounded-full blur-2xl opacity-50 animate-float-delayed hidden sm:block"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<div id="marquee" class="scrolling-wrapper overflow-hidden relative w-full pt-12 md:pt-16 mb-10 dark:bg-black" style="touch-action: pan-y; -webkit-overflow-scrolling: touch;">
    <div class="flex whitespace-nowrap cursor-pointer pointer-events-none" id="scrollTrack"></div>
</div>

<!-- Our Clients Section -->
<section id="clients" class="py-16 md:py-24 bg-white dark:bg-black">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-12">
        <!-- Section Header -->
        <div class="text-center mb-12 md:mb-16">
            <div class="inline-flex items-center gap-3 px-4 py-2.5 bg-gray-100 dark:bg-white/10 border border-gray-200 dark:border-white/20 rounded-full mb-6">
                <span class="text-xs font-semibold text-gray-600 dark:text-gray-300 tracking-widest uppercase">Trusted By</span>
            </div>
            <h2 class="text-4xl sm:text-5xl lg:text-6xl font-black tracking-tight text-gray-900 dark:text-white">
                Our Clients
            </h2>
            <div class="flex items-center justify-center gap-3 mt-6">
                <div class="h-[3px] w-12 bg-gradient-to-r from-transparent to-gray-400 dark:to-gray-600 rounded-full"></div>
                <div class="h-[3px] w-20 bg-gray-900 dark:bg-white rounded-full"></div>
                <div class="h-[3px] w-12 bg-gradient-to-l from-transparent to-gray-400 dark:to-gray-600 rounded-full"></div>
            </div>
        </div>

        <!-- Client Logos Grid -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 sm:gap-6">
            <div
                *ngFor="let client of clients"
                class="group flex items-center justify-center h-32 sm:h-40 rounded-2xl bg-gray-50 dark:bg-zinc-900 border border-gray-200 dark:border-zinc-800 hover:border-gray-400 dark:hover:border-zinc-600 transition-all duration-300 p-6">
                <img
                    *ngIf="client.logo"
                    [src]="client.logo"
                    [alt]="client.name"
                    loading="lazy"
                    class="max-h-full max-w-full object-contain grayscale opacity-70 group-hover:grayscale-0 group-hover:opacity-100 transition-all duration-300">
                <div
                    *ngIf="!client.logo"
                    class="flex flex-col items-center text-center text-gray-400 dark:text-zinc-600 group-hover:text-gray-900 dark:group-hover:text-white transition-colors duration-300">
                    <span class="text-2xl sm:text-3xl font-black tracking-tight">{{ client.name }}</span>
                    <span *ngIf="client.subtitle" class="mt-1 text-xs sm:text-sm font-medium uppercase tracking-widest text-gray-400 dark:text-zinc-600 group-hover:text-gray-600 dark:group-hover:text-gray-300 transition-colors duration-300">{{ client.subtitle }}</span>
                </div>
            </div>
        </div>
    </div>
</section>

<section id="portfolio" class="py-20 overflow-hidden slider-depth bg-white dark:bg-black">
    <div class="swiper projectSwiper w-full pb-12" *ngIf="renderSlides && renderSlides.length > 0">
        <div class="swiper-wrapper">
            <div class="swiper-slide w-full aspect-video max-h-[600px] max-w-4xl rounded-2xl overflow-hidden transition-all duration-500 hover:shadow-2xl hover:scale-105" *ngFor="let s of renderSlides">
                <img [src]="s.image" loading="lazy" class="w-full h-full object-cover">
            </div>
        </div>
        
    </div>
</section>
