<div class="contact-section min-h-screen bg-white dark:bg-black transition-colors duration-300">
    <!-- Background Pattern -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
        <div class="absolute inset-0 boxy-grid-bg opacity-[0.025] dark:opacity-[0.04]"></div>
        <div class="absolute top-0 left-1/4 w-[36rem] h-[36rem] bg-gray-500/5 dark:bg-gray-500/[0.07] rounded-full blur-3xl"></div>
        <div class="absolute bottom-1/4 right-1/4 w-[30rem] h-[30rem] bg-gray-400/5 dark:bg-gray-400/[0.06] rounded-full blur-3xl"></div>
    </div>

    <div class="relative w-full mx-auto px-4 sm:px-6 lg:px-8 py-20 pt-32">
        <!-- Header -->
        <div class="text-center mb-16">
            <!-- Badge -->
            <div class="inline-flex items-center gap-3 px-4 py-2.5 bg-gray-100 dark:bg-white/10 border border-gray-200 dark:border-white/20 rounded-full mb-8">
                <span class="text-xs font-semibold text-gray-600 dark:text-gray-300 tracking-widest uppercase">Get In Touch</span>
            </div>
            <!-- Main Heading -->
            <div class="mb-8">
                <h1 class="text-4xl sm:text-5xl lg:text-7xl font-black tracking-tight mb-6 text-gray-900 dark:text-white">
                    Contact Us
                </h1>
                <div class="flex items-center justify-center gap-3">
                    <div class="heading-line h-[3px] w-12 bg-gradient-to-r from-transparent to-gray-400 dark:to-gray-600 rounded-full"></div>
                    <div class="heading-line-center h-[3px] w-20 bg-gray-900 dark:bg-white rounded-full"></div>
                    <div class="heading-line-right h-[3px] w-12 bg-gradient-to-l from-transparent to-gray-400 dark:to-gray-600 rounded-full"></div>
                </div>
            </div>

            <!-- Description -->
            <p class="text-base sm:text-lg text-gray-600 dark:text-gray-400 max-w-2xl mx-auto leading-relaxed font-medium">
                Have a project in mind? Let's talk about how we can
                <br class="hidden sm:block" />
                help bring your vision to life.
            </p>
        </div>

        <!-- Main Content Grid -->
        <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-5 gap-12 lg:gap-16">
            
            <!-- Contact Info Column -->
            <div class="lg:col-span-2 space-y-8">
                <!-- Contact Cards -->
                <div *ngFor="let info of contactInfo" 
                     class="contact-info-card group flex items-start gap-4 p-6 bg-gray-50 dark:bg-zinc-900 rounded-2xl border border-gray-200 dark:border-zinc-800 hover:border-gray-400 dark:hover:border-zinc-600 transition-all duration-300">
                    
                    <!-- Icon -->
                    <div class="flex-shrink-0 w-12 h-12 rounded-xl bg-gray-200 dark:bg-zinc-800 flex items-center justify-center group-hover:bg-gray-900 dark:group-hover:bg-white transition-all duration-300">
                        <!-- Email Icon -->
                        <svg *ngIf="info.icon === 'email'" class="w-5 h-5 text-gray-700 dark:text-gray-300 group-hover:text-white dark:group-hover:text-gray-900 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                        </svg>
                        <!-- WhatsApp Icon -->
                        <svg *ngIf="info.icon === 'whatsapp'" class="w-5 h-5 text-gray-700 dark:text-gray-300 group-hover:text-white dark:group-hover:text-gray-900 transition-colors" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M.057 24l1.687-6.163a11.867 11.867 0 01-1.587-5.945C.16 5.335 5.495 0 12.05 0a11.817 11.817 0 018.413 3.488 11.824 11.824 0 013.48 8.414c-.003 6.557-5.338 11.892-11.893 11.892a11.9 11.9 0 01-5.688-1.448L.057 24zm6.597-3.807c1.676.995 3.276 1.591 5.392 1.592 5.448 0 9.886-4.434 9.889-9.885.002-5.462-4.415-9.89-9.881-9.892-5.452 0-9.887 4.434-9.889 9.884a9.86 9.86 0 001.51 5.26l-.999 3.648 3.978-1.607zm11.387-5.464c-.074-.124-.272-.198-.57-.347-.297-.149-1.758-.868-2.031-.967-.272-.099-.47-.149-.669.149-.198.297-.768.967-.941 1.165-.173.198-.347.223-.644.074-.297-.149-1.255-.462-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.297-.347.446-.521.151-.172.2-.296.3-.495.099-.198.05-.372-.025-.521-.075-.148-.669-1.611-.916-2.206-.242-.579-.487-.501-.669-.51l-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.263.489 1.694.626.712.226 1.36.194 1.872.118.571-.085 1.758-.719 2.006-1.413.248-.695.248-1.29.173-1.414z"/>
                        </svg>
                        <!-- Location Icon -->
                        <svg *ngIf="info.icon === 'location'" class="w-5 h-5 text-gray-700 dark:text-gray-300 group-hover:text-white dark:group-hover:text-gray-900 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
                        </svg>
                    </div>

                    <!-- Content -->
                    <div>
                        <h3 class="text-sm font-semibold text-gray-500 dark:text-gray-400 mb-1">{{ info.title }}</h3>
                        <a [href]="info.link"
                           target="_blank"
                           rel="noopener noreferrer"
                           class="text-gray-900 dark:text-white font-medium hover:underline transition-colors">
                            {{ info.value }}
                        </a>
                    </div>
                </div>

            </div>

            <!-- Form Column -->
            <div class="lg:col-span-3">
                <form (ngSubmit)="onSubmit()" class="contact-form bg-gray-50 dark:bg-zinc-900 rounded-3xl p-8 sm:p-10 border border-gray-200 dark:border-zinc-800">
                    
                    <!-- Success Message -->
                    <div *ngIf="isSubmitted()" 
                         class="mb-8 p-4 bg-gray-100 dark:bg-zinc-800 border border-gray-300 dark:border-zinc-700 rounded-xl flex items-center gap-3">
                        <div class="w-8 h-8 rounded-full bg-gray-900 dark:bg-white flex items-center justify-center flex-shrink-0">
                            <svg class="w-4 h-4 text-white dark:text-gray-900" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                            </svg>
                        </div>
                        <p class="text-gray-900 dark:text-white font-medium">Thank you! Your message has been sent successfully.</p>
                    </div>

                    <!-- Error Message -->
                    <div *ngIf="hasError()"
                         class="mb-8 p-4 bg-red-50 dark:bg-red-950/40 border border-red-300 dark:border-red-900 rounded-xl flex items-center gap-3">
                        <div class="w-8 h-8 rounded-full bg-red-600 flex items-center justify-center flex-shrink-0">
                            <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                            </svg>
                        </div>
                        <p class="text-red-700 dark:text-red-300 font-medium">Something went wrong. Please try again or email us directly.</p>
                    </div>

                    <!-- Form Grid -->
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-6 mb-6">
                        <!-- Name -->
                        <div>
                            <label for="name" class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">Name *</label>
                            <input 
                                type="text" 
                                id="name"
                                [(ngModel)]="formData.name"
                                name="name"
                                required
                                class="w-full px-4 py-3 rounded-xl bg-white dark:bg-zinc-800 border border-gray-200 dark:border-zinc-700 text-gray-900 dark:text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-gray-900 dark:focus:ring-white focus:border-transparent transition-all"
                                placeholder="John Doe">
                        </div>

                        <!-- Email -->
                        <div>
                            <label for="email" class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">Email *</label>
                            <input 
                                type="email" 
                                id="email"
                                [(ngModel)]="formData.email"
                                name="email"
                                required
                                class="w-full px-4 py-3 rounded-xl bg-white dark:bg-zinc-800 border border-gray-200 dark:border-zinc-700 text-gray-900 dark:text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-gray-900 dark:focus:ring-white focus:border-transparent transition-all"
                                placeholder="john@example.com">
                        </div>
                    </div>

                    <!-- Subject -->
                    <div class="mb-6">
                        <label for="subject" class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">Subject</label>
                        <input 
                            type="text" 
                            id="subject"
                            [(ngModel)]="formData.subject"
                            name="subject"
                            class="w-full px-4 py-3 rounded-xl bg-white dark:bg-zinc-800 border border-gray-200 dark:border-zinc-700 text-gray-900 dark:text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-gray-900 dark:focus:ring-white focus:border-transparent transition-all"
                            placeholder="Project Inquiry">
                    </div>

                    <!-- Message -->
                    <div class="mb-8">
                        <label for="message" class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">Message *</label>
                        <textarea 
                            id="message"
                            [(ngModel)]="formData.message"
                            name="message"
                            required
                            rows="5"
                            class="w-full px-4 py-3 rounded-xl bg-white dark:bg-zinc-800 border border-gray-200 dark:border-zinc-700 text-gray-900 dark:text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-gray-900 dark:focus:ring-white focus:border-transparent transition-all resize-none"
                            placeholder="Tell us about your project..."></textarea>
                    </div>

                    <!-- Submit Button -->
                    <button 
                        type="submit"
                        [disabled]="isSubmitting()"
                        class="w-full sm:w-auto px-8 py-4 bg-gray-900 dark:bg-white text-white dark:text-gray-900 font-semibold rounded-xl hover:bg-gray-800 dark:hover:bg-gray-100 disabled:opacity-50 disabled:cursor-not-allowed transition-all duration-300 flex items-center justify-center gap-2">
                        <span *ngIf="!isSubmitting()">Send Message</span>
                        <span *ngIf="isSubmitting()">Sending...</span>
                        <svg *ngIf="!isSubmitting()" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"/>
                        </svg>
                        <svg *ngIf="isSubmitting()" class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
