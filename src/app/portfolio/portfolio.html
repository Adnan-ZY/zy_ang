<div class="portfolio-section min-h-screen bg-gray-50 dark:bg-zinc-950 transition-colors duration-300">
    <!-- Background Pattern -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
        <div class="absolute inset-0 boxy-grid-bg opacity-[0.025] dark:opacity-[0.04]"></div>
        <div class="absolute top-0 left-1/4 w-[36rem] h-[36rem] bg-gray-500/5 dark:bg-gray-500/[0.07] rounded-full blur-3xl"></div>
        <div class="absolute bottom-1/4 right-1/4 w-[30rem] h-[30rem] bg-gray-400/5 dark:bg-gray-400/[0.06] rounded-full blur-3xl"></div>
    </div>

    <div class="relative w-full max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-20 pt-32">
        <!-- Header -->
        <div class="text-center mb-14 md:mb-16">
            <div class="inline-flex items-center gap-3 px-4 py-2.5 bg-gray-100 dark:bg-white/10 border border-gray-200 dark:border-white/20 rounded-full mb-8">
                <span class="text-xs font-semibold text-gray-600 dark:text-gray-300 tracking-widest uppercase">About</span>
            </div>
            <h1 class="text-4xl sm:text-5xl lg:text-7xl font-black tracking-tighter mb-6 text-gray-900 dark:text-white">
                About ZYPHERX
            </h1>
            <div class="flex items-center justify-center gap-3">
                <div class="h-[3px] w-12 bg-gradient-to-r from-transparent to-gray-400 dark:to-gray-600 rounded-full"></div>
                <div class="h-[3px] w-20 bg-gray-900 dark:bg-white rounded-full"></div>
                <div class="h-[3px] w-12 bg-gradient-to-l from-transparent to-gray-400 dark:to-gray-600 rounded-full"></div>
            </div>
        </div>

        <!-- Profile -->
        <div class="grid lg:grid-cols-3 gap-6 lg:gap-8">
            <!-- Identity Card -->
            <div class="lg:col-span-1">
                <div class="h-full bg-white dark:bg-zinc-900 rounded-3xl border border-gray-200 dark:border-zinc-800 p-8 flex flex-col items-center text-center">
                    <!-- Monogram -->
                    <div class="w-28 h-28 rounded-2xl bg-gray-900 dark:bg-white flex items-center justify-center shadow-xl mb-6">
                        <span class="text-5xl font-black text-white dark:text-gray-900">A</span>
                    </div>
                    <h2 class="text-2xl font-black tracking-tight text-gray-900 dark:text-white">{{ name }}</h2>
                    <p class="mt-2 text-sm font-semibold text-gray-500 dark:text-gray-400">{{ role }}</p>

                    <div class="w-full h-px bg-gray-100 dark:bg-zinc-800 my-6"></div>

                    <div class="flex flex-col gap-2 w-full">
                        <a routerLink="/contact" class="group inline-flex items-center justify-center gap-2 w-full px-5 py-3 bg-gray-900 dark:bg-white text-white dark:text-gray-900 font-semibold rounded-full hover:bg-gray-800 dark:hover:bg-gray-100 transition-all duration-300 text-sm">
                            Get in touch
                            <svg class="w-4 h-4 transition-transform group-hover:translate-x-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"/>
                            </svg>
                        </a>
                        <a routerLink="/projects" class="inline-flex items-center justify-center gap-2 w-full px-5 py-3 text-gray-700 dark:text-gray-300 font-semibold rounded-full border border-gray-300 dark:border-zinc-700 hover:border-gray-900 dark:hover:border-white hover:text-gray-900 dark:hover:text-white transition-all duration-300 text-sm">
                            View our work
                        </a>
                    </div>
                </div>
            </div>

            <!-- About + Skills -->
            <div class="lg:col-span-2 space-y-6">
                <!-- About -->
                <div class="bg-white dark:bg-zinc-900 rounded-3xl border border-gray-200 dark:border-zinc-800 p-8 sm:p-10">
                    <h3 class="text-xs font-bold text-gray-400 dark:text-gray-500 uppercase tracking-widest mb-4">About</h3>
                    <p class="text-base sm:text-lg text-gray-600 dark:text-gray-300 leading-relaxed">
                        {{ about }}
                    </p>
                </div>

                <!-- What we value -->
                <div class="bg-white dark:bg-zinc-900 rounded-3xl border border-gray-200 dark:border-zinc-800 p-8 sm:p-10">
                    <h3 class="text-xs font-bold text-gray-400 dark:text-gray-500 uppercase tracking-widest mb-4">What we value</h3>
                    <div class="flex flex-wrap gap-2.5">
                        <span *ngFor="let value of values"
                              class="px-4 py-2 text-sm font-semibold text-gray-700 dark:text-gray-300 bg-gray-100 dark:bg-zinc-800 rounded-full border border-gray-200 dark:border-zinc-700">
                            {{ value }}
                        </span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
